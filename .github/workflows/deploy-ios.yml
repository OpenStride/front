name: Build & Deploy iOS

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-ios
  cancel-in-progress: false

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod
        env:
          VITE_APP_BASE_URL: https://openstride.org
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          VITE_GOOGLE_DRIVE_API_KEY: ${{ secrets.VITE_GOOGLE_DRIVE_API_KEY }}

      - name: Install Capacitor
        run: |
          npm install @capacitor/cli @capacitor/ios
          cp ci/capacitor.config.json .
          npx cap add ios
          npx cap sync ios

      # TODO: install Capacitor health plugin when selected
      # - name: Install HealthKit plugin
      #   run: npm install <capacitor-healthkit-plugin>

      - name: Patch iOS project for HealthKit
        run: |
          # Add HealthKit entitlements
          cp ci/ios/Entitlements.plist ios/App/App/App.entitlements

          # Add HealthKit usage descriptions to Info.plist
          plutil -replace NSHealthShareUsageDescription \
            -string "OpenStride imports your workouts to analyze your training." \
            ios/App/App/Info.plist
          plutil -replace NSHealthUpdateUsageDescription \
            -string "OpenStride can save workouts to Apple Health." \
            ios/App/App/Info.plist

          # Enable HealthKit capability in project
          plutil -replace UIRequiredDeviceCapabilities \
            -json '["healthkit"]' \
            ios/App/App/Info.plist

          echo "iOS project patched for HealthKit"

      - name: Install Apple certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate and profile
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist ci/ios/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/App.ipa" \
            -t ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
