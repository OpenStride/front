name: Version Bump & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: false

permissions:
  contents: write
  checks: write

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'

      - name: Determine bump type from PR labels
        id: bump-type
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            let bumpType = 'patch';
            if (prs.length > 0) {
              const labels = prs[0].labels.map(l => l.name);
              if (labels.includes('release:major')) bumpType = 'major';
              else if (labels.includes('release:minor')) bumpType = 'minor';
            }
            core.setOutput('bump_type', bumpType);

      - name: Bump version
        id: bump
        run: |
          OLD=$(node -p "require('./package.json').version")
          npm version ${{ steps.bump-type.outputs.bump_type }} --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          echo "new_version=${NEW}" >> $GITHUB_OUTPUT
          echo "Bumped: ${OLD} -> ${NEW}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --tags

  deploy:
    name: Deploy to Firebase Hosting
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod
        env:
          VITE_APP_BASE_URL: https://openstride.org
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          VITE_GOOGLE_DRIVE_API_KEY: ${{ secrets.VITE_GOOGLE_DRIVE_API_KEY }}

      - name: Deploy to Firebase Hosting (Live Channel)
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OPENSTRIDE }}
          channelId: live
          projectId: openstrive-edd63

      - name: Deployment summary
        run: |
          echo "Deployed v${{ needs.version-bump.outputs.new_version }} to https://openstride.org"
