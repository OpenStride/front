name: Deploy Production

on:
  workflow_dispatch: # Deploy manuel uniquement (le bump workflow gère les merges)

# Only run one deployment at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  checks: write
  contents: read

jobs:
  deploy:
    name: Deploy to Firebase Hosting & Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install and build Functions
        run: cd functions && npm ci && npm run build

      - name: Build production
        run: npm run build:prod
        env:
          VITE_APP_BASE_URL: https://openstride.org
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          VITE_GOOGLE_DRIVE_API_KEY: ${{ secrets.VITE_GOOGLE_DRIVE_API_KEY }}
          VITE_GARMIN_CLIENT_ID: ${{ secrets.VITE_GARMIN_CLIENT_ID }}

      - name: Deploy to Firebase Hosting (Live Channel)
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OPENSTRIDE }}
          channelId: live
          projectId: openstrive-edd63

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OPENSTRIDE }}

      - name: Deploy Firebase Functions
        run: npx firebase-tools deploy --only functions --project openstrive-edd63

      - name: Deployment summary
        run: |
          echo "Deployment completed successfully"
          echo "Live URL: https://openstride.org"
